name: Snyk Open Source

on:
  push:
    branches: [ development, main ]
  pull_request:
    branches: [ development, main ]
    types: [opened, synchronize, reopened]

jobs:
  snyk:
    name: Snyk - Scan Dependencies
    runs-on: ubuntu-latest
    steps:

      # 1. Baixar o código do repositório
      - uses: actions/checkout@v4

      # 2. Configurar a versão do Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Instalar dependências (Snyk precisa dos pacotes instalados para análise)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync

      # 4. Criar requirements.txt
      - name: Generate requirements.txt
        run: uv export --format requirements-txt > requirements.txt

      # 5. Escanear vulnerabilidades nas bibliotecas (Open Source / SCA)
      - name: Snyk Open Source Scan
        uses: snyk/actions/python-3.10@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects

      # 6. Monitorar vulnerabilidades nas bibliotecas
      - name: Snyk Monitor
        uses: snyk/actions/python@master
        with:
          command: monitor
          args: --file=pyproject.toml
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
